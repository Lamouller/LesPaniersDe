name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-typecheck-build:
    name: Lint, typecheck et build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v6

      - name: Configuration de Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Installation des dépendances
        working-directory: apps/web
        run: npm ci

      - name: Lint (ESLint)
        working-directory: apps/web
        run: npm run lint

      - name: Vérification TypeScript
        working-directory: apps/web
        run: npm run typecheck

      - name: Build de production Next.js
        working-directory: apps/web
        env:
          # Variables publiques nécessaires au build Next.js
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key-for-build
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build
